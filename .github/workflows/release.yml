name: Release

# 推一個 v* tag（例：git tag v0.1.0 && git push origin v0.1.0）或手動觸發，
# 在 Windows / Linux / macOS 三個 runner 各自打包安裝檔 + 簽章的自動更新產物，
# 發佈到 GitHub Releases（草稿）。發佈草稿後，已安裝的 App 下次啟動就會收到更新。
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: 安裝 npm 相依
        run: npm ci

      - name: 產生跨平台圖示（含 macOS .icns）
        run: npx tauri icon src-tauri/icons/128x128@2x.png

      - name: 打包 + 發佈
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 自動更新簽章（在 repo Settings → Secrets 設定）
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "語音轉文字 ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false

  # tauri-action 在 Win+Mac matrix 下不會產出統一的 latest.json（各 job 互相蓋掉）→
  # 自動更新器抓不到清單。這個 job 在 matrix 跑完後，從 release 的 .sig 與安裝檔組出
  # latest.json 再上傳。純附加：build job 不受影響，失敗也不影響安裝檔產出。
  updater-json:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 合成並上傳 latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VER="${TAG#v}"
          RID=$(gh api "repos/$REPO/releases" --jq ".[] | select(.tag_name==\"$TAG\") | .id" | head -n1)
          echo "release id: $RID  version: $VER"
          ASSETS=$(gh api "repos/$REPO/releases/$RID/assets?per_page=100")
          url_of()   { echo "$ASSETS" | jq -r --arg s "$1" '.[] | select(.name|endswith($s)) | .browser_download_url' | head -n1; }
          sigid_of() { echo "$ASSETS" | jq -r --arg s "$1" '.[] | select(.name|endswith($s)) | .id' | head -n1; }
          fetch_sig(){ gh api "repos/$REPO/releases/assets/$(sigid_of "$1")" -H "Accept: application/octet-stream"; }

          WIN_URL=$(url_of "x64-setup.exe");        WIN_SIG=$(fetch_sig "x64-setup.exe.sig")
          MAC_URL=$(url_of "aarch64.app.tar.gz");   MAC_SIG=$(fetch_sig "aarch64.app.tar.gz.sig")
          test -n "$WIN_URL" && test -n "$WIN_SIG" || { echo "缺 Windows 產物，中止"; exit 1; }

          jq -n --arg ver "$VER" --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                --arg wurl "$WIN_URL" --arg wsig "$WIN_SIG" \
                --arg murl "$MAC_URL" --arg msig "$MAC_SIG" '
            {
              version: $ver,
              notes: "語音轉文字更新",
              pub_date: $date,
              platforms: (
                (if $wurl != "" then {"windows-x86_64": {signature: $wsig, url: $wurl}} else {} end)
                + (if $murl != "" then {"darwin-aarch64": {signature: $msig, url: $murl}} else {} end)
              )
            }' > latest.json
          echo "--- latest.json ---"; cat latest.json
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
