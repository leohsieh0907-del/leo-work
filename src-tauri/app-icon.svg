<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 圓角方塊底（品牌靛紫漸層）-->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#sheen)"/>

  <!-- 麥克風 -->
  <g>
    <!-- 麥克風本體（白色膠囊）-->
    <rect x="396" y="212" width="232" height="356" rx="116" fill="#ffffff"/>
    <!-- 膠囊內的綠色聲波等化器（品牌 accent）-->
    <g fill="#34d399">
      <rect x="453" y="330" width="34" height="120" rx="17"/>
      <rect x="495" y="300" width="34" height="180" rx="17"/>
      <rect x="537" y="348" width="34" height="84" rx="17"/>
    </g>
    <!-- 麥克風托架弧 -->
    <path d="M330 462 C330 656 694 656 694 462" fill="none" stroke="#ffffff" stroke-width="42" stroke-linecap="round"/>
    <!-- 支柱 -->
    <rect x="491" y="640" width="42" height="104" rx="21" fill="#ffffff"/>
    <!-- 底座 -->
    <rect x="404" y="753" width="216" height="42" rx="21" fill="#ffffff"/>
  </g>
</svg>
